<!DOCTYPE html>

  <title>Document</title>
  <style>
    * {

    body {

    ul {

      margin: 0;
      padding: 0;
    }

    a {

    button {

    .wrapper {}

    .wrapper>header {

      height: 80px;
      background-color: #fa0050;

    }

    .wrapper>header>.top-header {

      justify-content: center;
    }

    .wrapper>header>.top-header>div {

      height: 80px;
      /* border: 1px solid; */
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wrapper>header>.top-header>div>.logo {

    }

      height: 40px;
      background-color: #fa0050;

      color: white;
      font-size: 1.5rem;
    }

    .wrapper>header>.top-header>div>.logo.right>.order {
      width: 120px;
      height: 40px;
      margin-right: 20px;
      background-color: #ff8a00;
      color: white;
      font-size: 1.5rem;
    }


    .wrapper>header>nav {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 235px;

      border: 1px solid;
      background-color: lightgray;

    }

    .wrapper>header>nav>.back {

    }

    .wrapper>header>nav>.back>.gps {

      height: 40px;

      border-radius: 10px;
      background-color: white;

    }

    .wrapper>header>nav>.back>.cancle {

      height: 40px;

    .wrapper>header>nav>.back>.search {

      height: 40px;
      background-color: #ff8a00;

    }

    .wrapper>header>nav>.gps>a {}

    .wrapper>header>nav>.text>a {}

    .wrapper>header>nav>.cancle>a {
      color: #fa0050;
    }

    .wrapper>header>nav>.search>a {
      color: white;
    }

    .wrapper>main {
      /* margin-top: 235px;
      display: flex;
      justify-content: center;
      align-items: center; */

    }

    .wrapper>main>.menu {

      display: flex;
      justify-content: center;
      align-items: center;

      
    }

    .wrapper>main>div {
      width: 1050px;
      height: 950px;
      border: 1px solid;
      display: flex;
    }

    .wrapper>footer {}
  </style>
</head>
