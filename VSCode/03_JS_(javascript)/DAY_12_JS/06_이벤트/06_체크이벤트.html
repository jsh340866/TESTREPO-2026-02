<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <div class="chk-block">
    <input type="checkbox" id="chk">
    <lable for="chk">체크박스</lable>
  </div>

  <script>
    const chkEl = document.querySelector('#chk');
    chkEl.addEventListener('change',(e)=>{
      console.log('e',e.target.value);
      console.log('e',e.target.checked);
      if(e.target.checked){
        document.querySelector('.chk-block lable').style.color='green';
      }
      else {
        document.querySelector('.chk-block lable').style.color='black';
      }
    })

  </script>

</body>
</html>
