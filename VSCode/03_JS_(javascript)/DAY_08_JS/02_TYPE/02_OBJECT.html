<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <!--  -->
  <h1>MYCAR</h1>
  <div>
    <h2>속성</h2>
  </div>
  <div>
    <lable>owner</lable>
    <input type="text" name="" id="owner" value="" readonly/>
  </div>
  <div>
    <lable>catagory</lable>
    <input type="text" name="" id="catagory" readonly/>
  </div>
  <div>
    <lable>fuleType</lable>
    <input type="text" name="" id="fuleType" readonly/>
  </div>
  <div>
    <lable>curSpeed</lable>
    <input type="text" name="" id="curSpeed" readonly/>
  </div>
  <div>
    <lable>fuelAmount</lable>
    <input type="text" name="" id="fuelAmount" readonly/>
  </div>
  <div>
    <button onclick="myCar.Accel()">가속</button>
    <button onclick="myCar.Break()">감속</button>
    <button onclick="myCar.toString()">상태확인</button>
  </div>
  <div>
    <label for="">속도</label>
    <div id="gauge" style="transition: .3s; height: 50px; width: 1px; background-color: orange;">you know that</div>
  </div>

  <hr/>

  <script>

    // object ? 사물,객체{key:value, key:value}
    // 속성 : 
    // 기능 : 

    // MyCar : 
    // 속성 : 소유자,브랜드명,속도,연료타입,연료량...
    // 기능 : 가속하다, 감속하다, 시동을 걸다, 시동을 끈다...

    // 오브젝트 구조 : 클래스
    const myCar = 
    {
      //속성 : 클래스의 매개변수
      owner : "정승원",
      catagory : "SUV",
      fuleType : "디젤",
      curSpeed : 0,
      fuelAmount : 100,
      //기능 : 함수
      Accel : function(){ //익명함수
        this.curSpeed += 10;
        console.log("가속처리 완료. 현재속도 : ",this.curSpeed)  
        document.getElementById('gauge').style.width=`${this.curSpeed*2}px`;
        document.getElementById('curSpeed').value=this.curSpeed
      }, 
      Break : function(){
        this.curSpeed -= 10;
        console.log("감속처리 완료. 현재속도 : ",this.curSpeed);
        document.getElementById('gauge').style.width=`${this.curSpeed*2}px`;
        document.getElementById('curSpeed').value=this.curSpeed;

      },
      toString : function(){
        console.log(this.owner,this.catagory,this.fuleType,this.curSpeed,this.fuelAmount);
      }

    };

    console.log(myCar);
    document.getElementById('owner').value=myCar.owner;
    document.getElementById('catagory').value=myCar.catagory; 
    document.getElementById('fuleType').value=myCar.fuleType;
    document.getElementById('curSpeed').value=myCar.curSpeed;
    document.getElementById('fuelAmount').value=myCar.fuelAmount;

    // 
    const tori = 
    {
      // 속성
      name : "토리",
      kind : "믹스견",
      age : 2,
      weight : 4.8, 
      // 기능
      sound : function(){console.log(`${this.name} 가 멍멍 짖습니다!`);},
      toString : function(){console.log(this.name, this.kind, this.age, this.weight);}
    }

    // console.log(tori);
    // tori.toString();

    tori["color"] = "검정";
    console.log(tori);
    tori.sound();
  </script>

</body>
</html>
