<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <!-- onClick 이벤트 -->
  <!-- 'on'은 이벤트 관련 태그 -->
  <button onClick="alert('HELLOWORLD')">BTM_1</button>
  <button onclick="alert(10+20)">BTM_2</button>
  <button onclick="alert('HELLOWORLD\nHELLOWORLD\nHELLOWORLD\n')">BTM_3</button>

  <hr/>
  <!-- a's href -->

  <a href="javascript:void(0)">btn_1</a>
  <a href="javascript:alert('HELLOWORLD')">btn_2</a>
  <a href="javascript:alert(10+20)">btn_3</a>
  <a href="javascript:console.log(obj)">btn_4</a>

  <script>
    // JSON : java script object notation 
    const obj = {"name" : "홍길동", "age" : "30", "addr" : "대구"};
    console.log(obj)
  </script>

</body>

</html>
