<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
    /*
    호이스팅
    변수와 함수의 정의가 코드 실행전에 메모리에 미리 저장되는 현상
    function 예약어 사용이 호이스팅 처리됨
    var 예약어 사용시 호이스팅 처리됨
    cf) 변수지정 : let , var / (심볼릭)상수지정 : const
    */
    // const 변하지 않는 원주율, 기준값으로 많이 사용된다.

    //----------------------------------------
    // 변수 HOSTING
    //----------------------------------------
    // var 어디에써도 적용, 단 오류가 발생했을때 찾기 힘들고
    // 선언후 값을 같이 작성하면 값은 그 위치에서 적용된다
    // let 있는 이상 var을 쓸 이유가 없다
    a = 10;
    console.log('a',a);
    var a;
    // let 위에서 아래로 순차적으로 적용, 오류 발생시 찾기 용이함
    let b ;
    b = 20;
    console.log('b',b);

    //----------------------------------------
    // 함수 HOSTING
    //----------------------------------------
    h1();
    function h1 () { // 아무곳에서나 부를수있음
      console.log("HELLO WORLD");
    }
    h2();
    const h2 = ()=>{ // 순서지향
      console.log("HELLO WORLD-2");
    }
    
    // var변수는 가급적 사용은 지양(사용하지 않는게 좋음)
    // function 은 목적에 따라 사용여부 결정(처음에 만든 효과를 주고싶으면 사용 - )
    // function 은 기본으로 이름부여도 가능하다(익명함수 or 이름부여된 함수 선택가능)
    // 화살표함수(()=>{}) 는 기본적으로 익명함수로 처리된다.
    

  </script>

</body>
</html>
